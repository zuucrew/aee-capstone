# =============================================================================
# api — FastAPI service behind an ALB (Load Balanced Web Service)
#
# CPU/memory bumped from 256/512 → 1024/2048 because the orchestrator
# bootstraps with torch + sentence-transformers + langchain + supabase +
# qdrant connections (~1.5 GB minimum at boot). 512 MiB would OOM-kill
# before /health ever returns.
#
# Tasks placed in PUBLIC subnets so they can reach the internet via the
# IGW (no NAT GW needed). The ALB still front-doors them.
#
# Secrets pulled from SSM Parameter Store under /nawaloka/dev/<KEY>.
# These are populated by scripts/aws/push_secrets.sh before first deploy.
# =============================================================================

name: api
type: Load Balanced Web Service

http:
  path: '/'
  healthcheck:
    path: '/health'
    healthy_threshold: 2
    unhealthy_threshold: 5
    interval: 30s
    timeout: 10s
    grace_period: 120s        # lifespan warmup needs time on cold start

image:
  build: docker/api/Dockerfile
  port: 8000

cpu: 1024            # 1 vCPU
memory: 2048         # 2 GiB — enough for torch + langchain + qdrant + supabase
platform: linux/x86_64
count: 2             # 2 replicas → demonstrates shared cache + queue across instances
exec: true
network:
  connect: true
  vpc:
    placement: public

variables:
  REDIS_URL: redis://nawaloka-redis-dev.serverless.uswest2.cache.amazonaws.com:6379/0
  ARQ_WORKER_ENABLED: "true"
  LOG_LEVEL: info
  TIMEZONE: Asia/Colombo

# Secrets pulled from SSM Parameter Store under /nawaloka/dev/<KEY>.
# Key on the left = env var name in the container.
# Value on the right = parameter name in SSM.
secrets:
  SUPABASE_DB_URL:        /nawaloka/dev/SUPABASE_DB_URL
  SUPABASE_URL:           /nawaloka/dev/SUPABASE_URL
  SUPABASE_KEY:           /nawaloka/dev/SUPABASE_KEY
  SUPABASE_SERVICE_KEY:   /nawaloka/dev/SUPABASE_SERVICE_KEY
  QDRANT_URL:             /nawaloka/dev/QDRANT_URL
  QDRANT_API_KEY:         /nawaloka/dev/QDRANT_API_KEY
  GROQ_API_KEY:           /nawaloka/dev/GROQ_API_KEY
  OPENROUTER_API_KEY:     /nawaloka/dev/OPENROUTER_API_KEY
  OPENAI_API_KEY:         /nawaloka/dev/OPENAI_API_KEY
  ANTHROPIC_API_KEY:      /nawaloka/dev/ANTHROPIC_API_KEY
  TAVILY_API_KEY:         /nawaloka/dev/TAVILY_API_KEY
  LANGFUSE_PUBLIC_KEY:    /nawaloka/dev/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY:    /nawaloka/dev/LANGFUSE_SECRET_KEY
  LANGFUSE_BASE_URL:      /nawaloka/dev/LANGFUSE_BASE_URL
  LIVEKIT_URL:            /nawaloka/dev/LIVEKIT_URL
  LIVEKIT_API_KEY:        /nawaloka/dev/LIVEKIT_API_KEY
  LIVEKIT_API_SECRET:     /nawaloka/dev/LIVEKIT_API_SECRET
  DEEPGRAM_API_KEY:       /nawaloka/dev/DEEPGRAM_API_KEY
  ELEVEN_API_KEY:         /nawaloka/dev/ELEVEN_API_KEY
