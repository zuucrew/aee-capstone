# Nginx config for the web container.
# Single virtual host that:
#   - serves the React SPA at /
#   - reverse-proxies everything under /api/* to the api container
#
# SSE-aware: /api/chat/stream needs proxy_buffering off so events flow
# through immediately instead of being held until the response closes.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults for an SPA.
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── /api/* → api container ─────────────────────────────────────
    # Strip the /api prefix because the FastAPI router doesn't expect it.
    # /api/chat        → http://api:8000/chat
    # /api/health      → http://api:8000/health
    # /api/chat/stream → http://api:8000/chat/stream (SSE)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / streaming friendliness
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Keep large patient profile responses comfortable
        client_max_body_size 2m;
    }

    # ── SPA fallback ───────────────────────────────────────────────
    # Any route the SPA defines client-side falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tiny health probe nginx serves itself (used by the container healthcheck).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
